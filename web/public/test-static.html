<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeSense - 交易直觉训练</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #3b82f6;
      font-size: 36px;
      margin-bottom: 10px;
    }
    p {
      color: #666;
      font-size: 18px;
      margin-bottom: 20px;
    }
    .status {
      color: #888;
      font-size: 14px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .status.loading {
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📈 TradeSense</h1>
    <p>交易直觉训练</p>
    <div class="status loading" id="status">⏳ 加载中...</div>
  </div>
  <script>
    // Simple check - if this runs, JavaScript works
    document.getElementById('status').textContent = '✅ JavaScript 正常加载';
    document.getElementById('status').style.background = '#d4edda';
    document.getElementById('status').style.color = '#155724';
  </script>
  <!-- Fallback: if JS doesn't run, user still sees the static content above -->
</body>
</html>
