name: Data Pipeline

on:
  schedule:
    - cron: "10 0 * * *"  # Daily quota refresh run: 00:10 UTC
    - cron: "0 12 * * *"  # Daily keep-alive: 12:00 UTC
  workflow_dispatch:
    inputs:
      remediate_symbols:
        description: "Optional, comma-separated stock symbols for targeted remediation (e.g. RDNT,TSLA)"
        required: false
        default: ""
      remediate_max_groups:
        description: "Optional, max auto groups to remediate this run"
        required: false
        default: "10000"

jobs:
  quota-harvest-pipeline:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '10 0 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm install

      - name: Validate required secrets
        env:
          STOCKDATA_API_KEY: ${{ secrets.STOCKDATA_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          [ -n "$STOCKDATA_API_KEY" ] || { echo "Missing secret: STOCKDATA_API_KEY"; exit 1; }
          [ -n "$MINIMAX_API_KEY" ] || { echo "Missing secret: MINIMAX_API_KEY"; exit 1; }
          [ -n "$SUPABASE_URL" ] || { echo "Missing secret: SUPABASE_URL"; exit 1; }
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || { echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY"; exit 1; }

      - name: Run daily quota-harvest ingestion
        working-directory: pipeline
        continue-on-error: true
        env:
          STOCKDATA_API_KEY: ${{ secrets.STOCKDATA_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPELINE_NEWS_REQUEST_BUDGET: "20"
          PIPELINE_PRICE_REQUEST_BUDGET: "80"
        run: npm run fetch:news && npm run fetch:prices && npm run generate:events

      - name: Remediate existing auto events (translate + top-up)
        working-directory: pipeline
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPELINE_REMEDIATE_SYMBOLS: ${{ github.event.inputs.remediate_symbols }}
          PIPELINE_REMEDIATE_MAX_GROUPS: ${{ github.event.inputs.remediate_max_groups }}
          PIPELINE_GEMINI_DELAY_MS: "1000"
        run: npm run remediate:events

  keep-alive:
    if: github.event_name == 'schedule' && github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          [ -n "$SUPABASE_URL" ] || { echo "Missing secret: SUPABASE_URL"; exit 1; }
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || { echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY"; exit 1; }

      - name: Keep Supabase project warm
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sS \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/event_groups?select=id&limit=1" >/dev/null
          echo "Keep-alive query completed."
