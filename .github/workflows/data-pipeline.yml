name: Data Pipeline

on:
  schedule:
    - cron: "0 0 * * 0"   # Weekly pipeline: Sunday 00:00 UTC
    - cron: "0 12 * * *"  # Daily keep-alive: 12:00 UTC
  workflow_dispatch:

jobs:
  weekly-pipeline:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * 0'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm install

      - name: Validate required secrets
        env:
          STOCKDATA_API_KEY: ${{ secrets.STOCKDATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          [ -n "$STOCKDATA_API_KEY" ] || { echo "Missing secret: STOCKDATA_API_KEY"; exit 1; }
          [ -n "$SUPABASE_URL" ] || { echo "Missing secret: SUPABASE_URL"; exit 1; }
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || { echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY"; exit 1; }

      - name: Run weekly data pipeline
        working-directory: pipeline
        env:
          STOCKDATA_API_KEY: ${{ secrets.STOCKDATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run run

  keep-alive:
    if: github.event_name == 'schedule' && github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          [ -n "$SUPABASE_URL" ] || { echo "Missing secret: SUPABASE_URL"; exit 1; }
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || { echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY"; exit 1; }

      - name: Keep Supabase project warm
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sS \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/event_groups?select=id&limit=1" >/dev/null
          echo "Keep-alive query completed."
