name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build

  # Deploy job - requires Vercel secrets to be configured
  # To enable deployment, add these secrets:
  # - VERCEL_TOKEN
  # - VERCEL_ORG_ID  
  # - VERCEL_PROJECT_ID
  # Then change 'if: false' to 'if: github.ref == refs/heads/main'
