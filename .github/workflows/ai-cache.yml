name: AI Cache Setup

on:
  workflow_dispatch:

jobs:
  setup-and-precompute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: npm install

      - name: Debug env vars
        run: |
          echo "SUPABASE_URL set: ${#SUPABASE_URL}"
          echo "SUPABASE_SERVICE_ROLE_KEY set: ${#SUPABASE_SERVICE_ROLE_KEY}"
          echo "MINIMAX_API_KEY set: ${#MINIMAX_API_KEY}"

      - name: Create AI explanation cache table
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Running setup script..."
          npx tsx setup-ai-cache.ts 2>&1 || echo "Setup failed, trying alternate method"

      - name: Create table via SQL if not exists
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Insert a dummy record to create table if not exists
          # This will fail if table doesn't exist - that's expected
          curl -s -X POST "https://xrwoagdzubrndejxzrmz.supabase.co/rest/v1/ai_explanation_cache" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "stock_symbol": "__init__",
              "stock_name": "__init__", 
              "event_ids": "__init__",
              "correct_answer": "涨",
              "user_prediction": "涨",
              "explanation": "init",
              "provider": "init"
            }' 2>&1 || echo "Table creation needed, trying alternate method..."

      - name: Precompute AI explanations
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          PIPELINE_MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          PIPELINE_PRECOMPUTE_BATCH_SIZE: "10"
          PIPELINE_VERBOSE: "true"
        run: |
          npx tsx precompute-ai-cache.ts 2>&1